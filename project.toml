[project]
name = "rexx370"
version = "0.1.0-dev"
type = "application"

[build]
cflags = ["-std=gnu99", "-I./include"]

[build.sources]
c_dirs = ["src/"]

[mvs.build.datasets.source]
suffix = "SOURCE"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 50, 20, 30]

[mvs.build.datasets.punch]
suffix = "OBJECT"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 30, 10, 30]

[mvs.build.datasets.ncalib]
suffix = "NCALIB"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 19069
space = ["TRK", 30, 10, 30]

[mvs.build.datasets.syslmod]
suffix = "LOAD"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 15040
space = ["TRK", 20, 10, 10]

[dependencies]
"mvslovers/crent370" = ">=1.0.9"
"mvslovers/lstring370" = "=0.1.0-dev"

[mvs.install]
naming = "fixed"

# ---------------------------------------------------------------
# TSTANCH - ENVBLOCK anchor smoketest pseudomodule
# Runs in TSO (CALL 'TSTANCH') or Batch (EXEC PGM=TSTANCH).
# Pulls in the full phase-1/phase-2 object set so IRXINIT and
# IRXTERM link cleanly; it exits with RC=0 on push/pop success.
#
# Listed before IRXJCL so the TSTANCH load module links even while
# the full IRXJCL CSECT (the batch entry point) has not been
# implemented yet — IRXJCL's link step is expected to fail at this
# phase, TSTANCH must not be blocked by it.
# ---------------------------------------------------------------
[[link.module]]
name = "TSTANCH"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
  "@@CRT1",
  "TST#ANCH",
  "IRX#INIT",
  "IRX#TERM",
  "IRX#STOR",
  "IRX#ANCH",
  "IRX#UID",
  "IRX#MSID",
  "IRX#COND",
  "IRX#BIF",
  "IRX#BIFS",
  "IRX#IO",
  "IRX#LSTR",
  "IRX#TOKN",
  "IRX#VPOL",
  "IRX#PARS",
  "IRX#CTRL",
  "IRX#EXEC",
  "IRX#ARIT",
]

[link.module.dep_includes]
"mvslovers/lstring370" = "*"

# ---------------------------------------------------------------
# IRXJCL - Batch entry point (PGM=IRXJCL)
# The main REXX interpreter for batch execution.
# Contains IRXINIT/IRXTERM and all Phase 1+ modules.
# ---------------------------------------------------------------
[[link.module]]
name = "IRXJCL"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
  "@@CRT1",
  "IRXJCL",
  "IRX#INIT",
  "IRX#TERM",
  "IRX#STOR",
  "IRX#ANCH",
  "IRX#UID",
  "IRX#MSID",
  "IRX#COND",
  "IRX#BIF",
  "IRX#BIFS",
  "IRX#IO",
  "IRX#LSTR",
  "IRX#TOKN",
  "IRX#VPOL",
  "IRX#PARS",
  "IRX#CTRL",
  "IRX#EXEC",
  "IRX#ARIT",
]

# ---------------------------------------------------------------
# IRXEXCOM - Variable access (separate load module per IBM spec)
# Loaded on demand via IRXEXTE entry point.
# ---------------------------------------------------------------
# [[link.module]]
# name = "IRXEXCOM"
# entry = "@@CRT0"
# options = ["LIST", "MAP", "XREF", "RENT"]
# include = ["@@CRT1", "IRX#XCOM"]

[release]
version_files = ["VERSION"]

[artifacts]
headers = true
header_files = ["irx.h", "irxanchor.h", "irxwkblk.h", "irxfunc.h",
                "irxbif.h", "irxbifs.h", "irxcond.h"]
loads = true
