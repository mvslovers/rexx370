[project]
name = "rexx370"
version = "0.1.0-dev"
type = "application"

[build]
cflags = ["-std=gnu99", "-I./include"]

[build.sources]
c_dirs = ["src/", "test/mvs/"]
asm_dirs = ["asm/"]

[mvs.build.datasets.source]
suffix = "SOURCE"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 200, 50, 50]

[mvs.build.datasets.punch]
suffix = "OBJECT"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 200, 50, 60]

[mvs.build.datasets.ncalib]
suffix = "NCALIB"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 19069
space = ["TRK", 300, 100, 60]

[mvs.build.datasets.syslmod]
suffix = "LOAD"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 15040
space = ["TRK", 600, 100, 60]

[dependencies]
"mvslovers/crent370" = ">=1.0.9"
"mvslovers/lstring370" = "=0.1.0-dev"

[mvs.install]
naming = "fixed"

# ---------------------------------------------------------------
# IRXANCHR - Language Processor Environment table (data module).
# Static table: 32-byte header + 64 x 40-byte slot array.
# Loaded at runtime via LOAD EP=IRXANCHR by irx_anchor_get_handle().
# No C runtime — pure assembler data object.
# ---------------------------------------------------------------
[[link.module]]
name = "IRXANCHR"
entry = "IRXANCHR"
options = ["LIST", "MAP", "XREF", "REUS"]
include = ["IRXANCHR"]

# ---------------------------------------------------------------
# IRXPARMS / IRXTSPRM / IRXISPRM - Default Parameter Modules.
# Static data objects: PARMBLOCK + MODNAMET + SUBCOMTB + PACKTB.
# Loaded by IRXINIT via LOAD EP=IRXxxxxx when the caller supplies
# no explicit PARMBLOCK (CON-1 §6.3, step 4).
# No C runtime — pure assembler data objects.
# ---------------------------------------------------------------
[[link.module]]
name = "IRXPARMS"
entry = "IRXPARMS"
options = ["LIST", "MAP", "XREF", "RENT", "REUS"]
include = ["IRXPARMS"]

[[link.module]]
name = "IRXTSPRM"
entry = "IRXTSPRM"
options = ["LIST", "MAP", "XREF", "RENT", "REUS"]
include = ["IRXTSPRM"]

[[link.module]]
name = "IRXISPRM"
entry = "IRXISPRM"
options = ["LIST", "MAP", "XREF", "RENT", "REUS"]
include = ["IRXISPRM"]

[[link.module]]
name = "IRXTMPW"
entry = "IRXTMPW"
options = ["LIST", "MAP", "XREF", "AC=1", "RENT", "REUS"]
include = ["IRXTMPW"]

# ---------------------------------------------------------------
# IRXINIT - HLASM Entry-Point Wrapper for the IRXINIT Programming
#          Service (SC28-1883-0 §14). Parses the caller VLIST,
#          extracts the function code, and delegates to the C-core
#          dispatcher irx_init_dispatch (asm() alias IRXIDISP).
#
# Built as a separate load module (per IBM convention IRXINIT and
# IRXTERM are independent load modules). The wrapper is the entry
# point; the C-core (IRX#INIT, IRX#TERM, IRX#STOR, IRX#ANCH,
# IRX#UID, IRX#MSID) is NCAL-linked into the same load module so
# the BALR R14,R15 to =V(IRXIDISP) resolves.
#
# WP-I1c.5 / TSK-198 / GitHub mvslovers/rexx370#83.
# ---------------------------------------------------------------
[[link.module]]
name = "IRXINIT"
entry = "IRXINIT"
options = ["LIST", "MAP", "XREF", "RENT", "REUS"]
include = [
  "IRXINIT",
  "IRX#INIT",
  "IRX#TERM",
  "IRX#STOR",
  "IRX#ANCH",
  "IRX#UID",
  "IRX#MSID",
]

# ---------------------------------------------------------------
# IRXTERM - HLASM Entry-Point Wrapper for the IRXTERM Programming
#          Service (SC28-1883-0 §15). Reads R0=ENVBLOCK, calls the
#          C-core irx_init_term (asm() alias IRXITERM), and reads
#          back ECTENVBK via anch_curr (alias ANCHCURR) to return
#          the predecessor envblock in R0.
#
# WP-I1c.5 / TSK-198 / GitHub mvslovers/rexx370#83.
# ---------------------------------------------------------------
[[link.module]]
name = "IRXTERM"
entry = "IRXTERM"
options = ["LIST", "MAP", "XREF", "RENT", "REUS"]
include = [
  "IRXTERM",
  "IRX#INIT",
  "IRX#TERM",
  "IRX#STOR",
  "IRX#ANCH",
  "IRX#UID",
  "IRX#MSID",
]

# ---------------------------------------------------------------
# TSTANCH - ENVBLOCK anchor smoketest pseudomodule
# Runs in TSO (CALL 'TSTANCH') or Batch (EXEC PGM=TSTANCH).
# Pulls in the full phase-1/phase-2 object set so IRXINIT and
# IRXTERM link cleanly; it exits with RC=0 on push/pop success.
#
# Listed before IRXJCL so the TSTANCH load module links even while
# the full IRXJCL CSECT (the batch entry point) has not been
# implemented yet — IRXJCL's link step is expected to fail at this
# phase, TSTANCH must not be blocked by it.
# ---------------------------------------------------------------
[[link.module]]
name = "TSTANCH"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
  "@@CRT1",
  "TSTANCH",
  "IRX#INIT",
  "IRX#TERM",
  "IRX#STOR",
  "IRX#ANCH",
  "IRX#UID",
  "IRX#MSID",
  "IRX#COND",
  "IRX#BIF",
  "IRX#BIFS",
  "IRX#IO",
  "IRX#LSTR",
  "IRX#TOKN",
  "IRX#VPOL",
  "IRX#PARS",
  "IRX#CTRL",
  "IRX#EXEC",
  "IRX#ARIT",
]

[link.module.dep_includes]
"mvslovers/lstring370" = "*"

# ---------------------------------------------------------------
# IRXDBG - Debug / Inspection Tool.
# Inspects IRXANCHR state, ECT/ECTENVBK slot, and ENVBLOCK fields.
# Useful during WP-I1c development to verify IRXINIT/IRXTERM state.
#
# Invocation:
#   TSO  :  CALL 'hlq.LOAD(IRXDBG)' 'ANCH'
#   TSO  :  CALL 'hlq.LOAD(IRXDBG)' 'CLEAR'
#   TSO  :  CALL 'hlq.LOAD(IRXDBG)' 'ECT'
#   TSO  :  CALL 'hlq.LOAD(IRXDBG)' 'ENV'
#   TSO  :  CALL 'hlq.LOAD(IRXDBG)' 'ENV 18BC5C90'
# ---------------------------------------------------------------
[[link.module]]
name = "IRXDBG"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = ["@@CRT1", "IRXDBG", "IRX#ANCH"]

# ---------------------------------------------------------------
# IRX#HELO - "Hello World" demo standalone load module.
# Runs an embedded REXX exec through irx_exec_run() that exercises
# SAY, arithmetic, NUMERIC DIGITS, string BIFs (LENGTH / REVERSE /
# TRANSLATE / SUBSTR / WORDS / WORD / CENTER), conversion BIFs
# (C2X / D2X / X2D), DO loops, SELECT / WHEN / OTHERWISE, and
# PARSE VAR.  Same dep_includes rationale as TSTANCH.
#
# Invocation:
#   TSO    :  CALL 'hlq.LOAD(IRX#HELO)'
#   Batch  :  EXEC PGM=IRX#HELO
# ---------------------------------------------------------------
[[link.module]]
name = "IRX#HELO"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
  "@@CRT1",
  "IRX#HELO",
  "IRX#INIT",
  "IRX#TERM",
  "IRX#STOR",
  "IRX#ANCH",
  "IRX#UID",
  "IRX#MSID",
  "IRX#COND",
  "IRX#BIF",
  "IRX#BIFS",
  "IRX#IO",
  "IRX#LSTR",
  "IRX#TOKN",
  "IRX#VPOL",
  "IRX#PARS",
  "IRX#CTRL",
  "IRX#EXEC",
  "IRX#ARIT",
]

[link.module.dep_includes]
"mvslovers/lstring370" = "*"

# ---------------------------------------------------------------
# TSTTOKN - WP-10 tokenizer unit tests (pilot MVS test load module).
# Standalone load module built from test/mvs/tsttokn.c. Runs the
# tokenizer test suite on MVS. Same dep_includes rationale as TSTANCH.
#
# Invocation:
#   TSO    :  CALL 'hlq.LOAD(TSTTOKN)'
#   Batch  :  EXEC PGM=TSTTOKN
#
# Exit code: 0 on success, 1 on any test failure.
# ---------------------------------------------------------------
[[link.module]]
name = "TSTTOKN"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
