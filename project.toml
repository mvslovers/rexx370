[project]
name = "rexx370"
version = "0.1.0-dev"
type = "application"

[build]
cflags = ["-std=gnu99", "-I./include"]

[build.sources]
c_dirs = ["src/", "test/mvs/"]

[mvs.build.datasets.source]
suffix = "SOURCE"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 200, 50, 50]

[mvs.build.datasets.punch]
suffix = "OBJECT"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 30, 10, 30]

[mvs.build.datasets.ncalib]
suffix = "NCALIB"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 19069
space = ["TRK", 30, 10, 30]

[mvs.build.datasets.syslmod]
suffix = "LOAD"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 15040
space = ["TRK", 150, 50, 30]

[dependencies]
"mvslovers/crent370" = ">=1.0.9"
"mvslovers/lstring370" = "=0.1.0-dev"

[mvs.install]
naming = "fixed"

# ---------------------------------------------------------------
# TSTANCH - ENVBLOCK anchor smoketest pseudomodule
# Runs in TSO (CALL 'TSTANCH') or Batch (EXEC PGM=TSTANCH).
# Pulls in the full phase-1/phase-2 object set so IRXINIT and
# IRXTERM link cleanly; it exits with RC=0 on push/pop success.
#
# Listed before IRXJCL so the TSTANCH load module links even while
# the full IRXJCL CSECT (the batch entry point) has not been
# implemented yet — IRXJCL's link step is expected to fail at this
# phase, TSTANCH must not be blocked by it.
# ---------------------------------------------------------------
[[link.module]]
name = "TSTANCH"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
  "@@CRT1",
  "TSTANCH",
  "IRX#INIT",
  "IRX#TERM",
  "IRX#STOR",
  "IRX#ANCH",
  "IRX#UID",
  "IRX#MSID",
  "IRX#COND",
  "IRX#BIF",
  "IRX#BIFS",
  "IRX#IO",
  "IRX#LSTR",
  "IRX#TOKN",
  "IRX#VPOL",
  "IRX#PARS",
  "IRX#CTRL",
  "IRX#EXEC",
  "IRX#ARIT",
]

[link.module.dep_includes]
"mvslovers/lstring370" = "*"

# ---------------------------------------------------------------
# IRX#HELO - "Hello World" demo standalone load module.
# Runs an embedded REXX exec through irx_exec_run() that exercises
# SAY, arithmetic, NUMERIC DIGITS, string BIFs (LENGTH / REVERSE /
# TRANSLATE / SUBSTR / WORDS / WORD / CENTER), conversion BIFs
# (C2X / D2X / X2D), DO loops, SELECT / WHEN / OTHERWISE, and
# PARSE VAR.  Same dep_includes rationale as TSTANCH.
#
# Invocation:
#   TSO    :  CALL 'hlq.LOAD(IRX#HELO)'
#   Batch  :  EXEC PGM=IRX#HELO
# ---------------------------------------------------------------
[[link.module]]
name = "IRX#HELO"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
  "@@CRT1",
  "IRX#HELO",
  "IRX#INIT",
  "IRX#TERM",
  "IRX#STOR",
  "IRX#ANCH",
  "IRX#UID",
  "IRX#MSID",
  "IRX#COND",
  "IRX#BIF",
  "IRX#BIFS",
  "IRX#IO",
  "IRX#LSTR",
  "IRX#TOKN",
  "IRX#VPOL",
  "IRX#PARS",
  "IRX#CTRL",
  "IRX#EXEC",
  "IRX#ARIT",
]

[link.module.dep_includes]
"mvslovers/lstring370" = "*"

# ---------------------------------------------------------------
# TSTTOKN - WP-10 tokenizer unit tests (pilot MVS test load module).
# Standalone load module built from test/mvs/tsttokn.c. Runs the
# tokenizer test suite on MVS. Same dep_includes rationale as TSTANCH.
#
# Invocation:
#   TSO    :  CALL 'hlq.LOAD(TSTTOKN)'
#   Batch  :  EXEC PGM=TSTTOKN
#
# Exit code: 0 on success, 1 on any test failure.
# ---------------------------------------------------------------
[[link.module]]
name = "TSTTOKN"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
  "@@CRT1",
  "TSTTOKN",
  "IRX#TOKN",
  "IRX#STOR",
]

[link.module.dep_includes]
"mvslovers/lstring370" = "*"

# ---------------------------------------------------------------
# MVS test load modules (follow-ups to the TSTTOKN pilot).
#
# Each test translation unit in test/mvs/ becomes its own standalone
# load module. The include list is the full Phase 1 + Phase 2 + EXEC
# + ARIT chain (same as TSTANCH / IRXJCL) because irx#bifs.c pulls in
# arithmetic and parser entry points even for tests that don't use
# them directly.
#
# Invocation pattern (adjust module name):
#   TSO    :  CALL 'hlq.LOAD(<NAME>)'
#   Batch  :  EXEC PGM=<NAME>
#
# Exit code: 0 on success, 1 on any test failure.
# ---------------------------------------------------------------
[[link.module]]
name = "TSTPHAS1"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
  "@@CRT1",
  "TSTPHAS1",
  "IRX#INIT", "IRX#TERM", "IRX#STOR", "IRX#ANCH",
  "IRX#UID",  "IRX#MSID", "IRX#COND", "IRX#BIF",
  "IRX#BIFS", "IRX#IO",   "IRX#LSTR", "IRX#TOKN",
  "IRX#VPOL", "IRX#PARS", "IRX#CTRL", "IRX#EXEC",
  "IRX#ARIT",
]

[link.module.dep_includes]
"mvslovers/lstring370" = "*"

